services:
  app:
    image: ${NOVEL_READER_IMAGE:-ghcr.io/halomico/novel-reader}:${NOVEL_READER_IMAGE_TAG:-latest}
    build:
      context: .
      target: runner
    container_name: novel-reader
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NOVEL_LIBRARY_DIR: /app/library/books
      DATABASE_PATH: /app/data/novels.db
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    volumes:
      - ./library/books:/app/library/books
      - ./data:/app/data
      - ./public/avatars:/app/public/avatars
